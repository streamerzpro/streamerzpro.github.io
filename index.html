    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              roseglow: {
                50: "#fff1f4",
                100: "#ffe4ea",
                200: "#ffc7d4",
                300: "#ff9fb8",
                400: "#ff6f95",
                500: "#ff3d78",

                800: "#94143f",

            },

    <link rel="stylesheet" href="styles.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />
  </head>
  <body class="text-white">
    <!-- ================= HEADER ================= -->
    <header class="site-header">
      <div class="logo">
        <i class="fa-solid fa-play"></i>
        <span>Streamers</span>
      </div>

      <div class="search-box">
        <i class="fa-solid fa-search"></i>
        <input type="text" id="search" placeholder="Search streams..." />
      </div>
    </header>

    <!-- ================= HERO ================= -->
    <section class="hero">
      <div class="overlay"></div>

      <div class="hero-content">
        <p class="eyebrow">Live sports, clean design</p>
        <h1 id="heroTitle">Welcome to Streamers</h1>
        <p>Browse live streams and choose what to watch.</p>

        <div class="hero-actions">
          <button id="watchNow" class="primary-btn">
            <i class="fa-solid fa-play"></i>
            Watch Now
          </button>

          <button id="scrollCategories" class="secondary-btn">
            <i class="fa-solid fa-grid-2"></i>
            Browse Categories
          </button>
        </div>
      </div>
    </section>

    <!-- ================= PLAYER ================= -->
    <section class="player-section" id="playerSection">
      <!-- <div class="promo-slot top-slot">
        Replace with ad network code or image/banner
        <span>Advertisement</span>
      </div> -->
      <div class="player-wrapper">
        <iframe
          id="player"
          src=""
          allow="autoplay; fullscreen; picture-in-picture"
          allowfullscreen
          loading="lazy"
          title="Stream player"
        ></iframe>
      </div>

      <!-- <div class="promo-slot bottom-slot">
        Replaced with ad network code or image/banner
        <span>Advertisement</span>
      </div> -->

      <div class="player-info">
        <div>
          <h2 id="streamTitle">Select a Stream</h2>
          <p id="streamDescription">
            Choose a category below to start watching.
          </p>
        </div>

        <div class="stream-meta">
          <span id="liveBadge" class="badge offline">OFFLINE</span>
          <span id="streamTime">--</span>
        </div>
      </div>
    </section>

    <!-- ================= FILTERS ================= -->
    <section class="controls">
      <div id="categoryButtons" class="category-buttons"></div>
    </section>

    <!-- ================= CONTENT ================= -->
    <main id="categories">
      <!-- Generated by JavaScript -->
    </main>

    <!-- ================= LOADER ================= -->
    <div id="loader" class="loader" aria-live="polite" aria-busy="true">
      <div class="spinner"></div>
    </div>

    <!-- ================= BACK TO TOP ================= -->
    <button id="topBtn" class="top-btn" aria-label="Back to top">
      <i class="fa-solid fa-arrow-up"></i>
    </button>

    <!-- ================= FOOTER ================= -->
    <footer class="site-footer">
      <div>
        <h3>Streamers</h3>
        <p>Modern live sports streaming platform</p>
      </div>

      <div>© 2026 Streamers</div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
